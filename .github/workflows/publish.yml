name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  check-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted publishing (OIDC)
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: pip install hatchling build

      - name: Read package version
        id: pkg_version
        run: |
          VERSION=$(python -c "import tomllib; f=open('pyproject.toml','rb'); d=tomllib.load(f); print(d['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECTED_TAG="v${{ steps.pkg_version.outputs.version }}"
          if [ "$TAG" != "$EXPECTED_TAG" ]; then
            echo "Tag $TAG does not match package version $EXPECTED_TAG"
            exit 1
          fi

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
